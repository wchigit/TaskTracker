name: Monitor Workflow Status

on:
  workflow_run:
    workflows: ["Build and Deploy Workflow"]
    types:
      - completed

jobs:
  create-issue-on-failure:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}

    steps:
      - name: Get workflow logs
        uses: actions/github-script@v6
        id: get-logs
        with:
          script: |
            const artifact = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id
            });
            
            const response = await github.rest.actions.downloadWorkflowRunLogs({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id
            });
            
            // Convert the ArrayBuffer to base64 string
            const base64String = Buffer.from(response.data).toString('base64');
            const decodedLogs = Buffer.from(base64String, 'base64').toString('utf-8');
            return decodedLogs;

      - name: Create issue
        uses: actions/github-script@v6
        with:
          script: |
            const issueTitle = `Workflow Failure: ${context.payload.workflow_run.name} (Run ID: ${context.payload.workflow_run.id})`;
            const issueBody = `
            ### Workflow Failure Details
            - Workflow: ${context.payload.workflow_run.name}
            - Run ID: ${context.payload.workflow_run.id}
            - Status: ${context.payload.workflow_run.conclusion}
            - Triggered by: ${context.payload.workflow_run.head_commit.message}
            - Commit: ${context.payload.workflow_run.head_sha}
            
            ### Workflow Logs
            \`\`\`
            ${{steps.get-logs.outputs.result}}
            \`\`\`
            `;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: issueBody,
              assignees: ['wchigit']
            });
