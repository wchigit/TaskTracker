name: Monitor Workflow Status

on:
  workflow_run:
    workflows: ["Build and Deploy Workflow"]
    types:
      - completed

jobs:
  create-issue-on-failure:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    
    steps:
      - name: Get workflow logs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run view ${{ github.event.workflow_run.id }} --log > workflow_logs.txt

      - name: Create issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Workflow Failure: Build and Deploy Workflow (Run #${{ github.event.workflow_run.id }})" \
            --body "$(cat workflow_logs.txt)" \
            --assignee "wchigit" \
            --repo ${{ github.repository }}
